<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dashboard - 100Dollars</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;family=Space+Grotesk:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            "colors": {
                "surface-container-highest": "#32343e",
                "outline": "#84967c",
                "surface": "#11131c",
                "error-container": "#93000a",
                "error": "#ffb4ab",
                "surface-container": "#1d1f29",
                "tertiary": "#ecfcff",
                "primary": "#ecffe0",
                "on-tertiary": "#00363d",
                "surface-container-lowest": "#0c0e17",
                "outline-variant": "#3b4b35",
                "on-secondary-container": "#480063",
                "surface-variant": "#32343e",
                "on-primary": "#033900",
                "surface-dim": "#11131c",
                "on-primary-fixed-variant": "#065300",
                "on-tertiary-fixed-variant": "#004f58",
                "on-primary-fixed": "#012200",
                "tertiary-fixed": "#9cf0ff",
                "secondary-fixed": "#f9d8ff",
                "on-surface": "#e1e1ef",
                "secondary-container": "#d05bff",
                "primary-container": "#22ff00",
                "inverse-primary": "#0a6e00",
                "secondary": "#ecb1ff",
                "on-background": "#e1e1ef",
                "inverse-surface": "#e1e1ef",
                "on-tertiary-container": "#006b78",
                "tertiary-fixed-dim": "#00daf3",
                "on-surface-variant": "#baccaf",
                "on-secondary": "#520070",
                "background": "#11131c",
                "surface-tint": "#1ee600",
                "tertiary-container": "#7fecff",
                "surface-container-low": "#191b24",
                "on-error-container": "#ffdad6",
                "primary-fixed-dim": "#1ee600",
                "on-secondary-fixed-variant": "#75009e",
                "inverse-on-surface": "#2e303a",
                "surface-bright": "#373943",
                "on-error": "#690005",
                "surface-container-high": "#282933",
                "on-primary-container": "#0b7100",
                "on-tertiary-fixed": "#001f24",
                "on-secondary-fixed": "#320046",
                "secondary-fixed-dim": "#ecb1ff",
                "primary-fixed": "#78ff5d"
            },
            "borderRadius": {
                "DEFAULT": "1rem",
                "lg": "2rem",
                "xl": "3rem",
                "full": "9999px"
            },
            "spacing": {
                "unit": "4px",
                "stack-sm": "8px",
                "stack-lg": "24px",
                "stack-md": "16px",
                "margin-mobile": "20px",
                "gutter": "12px"
            },
            "fontFamily": {
                "display-lg": ["Plus Jakarta Sans"],
                "body-md": ["Plus Jakarta Sans"],
                "label-caps": ["Space Grotesk"],
                "headline-lg": ["Plus Jakarta Sans"],
                "headline-md": ["Plus Jakarta Sans"],
                "body-lg": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700"}],
                "headline-lg": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "700"}],
                "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "500"}]
            }
        }
    }
}
</script>
<style>
body { background-color: #000000; }
body { min-height: max(884px, 100dvh); }
body { overflow-y: auto; transition: background-color 0.3s, color 0.3s; }
body.light-mode { background-color: #f5f5f5; }
body.light-mode .bg-surface { background-color: #ffffff !important; border-color: #e0e0e0 !important; }
body.light-mode .bg-surface-container { background-color: #f0f0f0 !important; }
body.light-mode .text-on-surface { color: #1a1a1a !important; }
body.light-mode .text-on-surface-variant { color: #555555 !important; }
body.light-mode .border-outline-variant { border-color: #cccccc !important; }
body.light-mode header { background-color: rgba(255,255,255,0.95) !important; border-color: #ddd !important; }
body.light-mode .text-on-background { color: #1a1a1a !important; }
body.light-mode h1, body.light-mode .gradient-text { background: linear-gradient(to right, #16a500, #22cc00) !important; -webkit-background-clip: text !important; -webkit-text-fill-color: transparent !important; filter: drop-shadow(0 0 6px rgba(34,255,0,0.4)); }
body.light-mode .glow-text { filter: drop-shadow(0 0 3px rgba(34,255,0,0.2)); }
.toggle-btn { background: transparent; border: none; cursor: pointer; padding: 8px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.toggle-btn:hover { background: rgba(34,255,0,0.1); }
body.light-mode .toggle-btn { color: #333; }
.gradient-text { background: linear-gradient(to right, #22ff00, #78ff5d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px rgba(34,255,0,0.5)); }
.glow-text { filter: drop-shadow(0 0 4px rgba(34,255,0,0.3)); }
</style>
</head>
<script>
// Apply theme immediately before page loads to prevent flash
if (localStorage.getItem('100dollars_theme') === 'light') {
    document.documentElement.classList.add('light-mode');
}
</script>
<body class="text-on-background min-h-screen pb-24 font-body-md">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-40 backdrop-blur-xl border-b flex justify-between items-center px-6 py-4 shadow-none">
<div class="flex items-center gap-3">
<img alt="User Avatar" id="userAvatar" class="w-10 h-10 rounded-full bg-surface-container border-2 border-primary-container cursor-pointer" onclick="goToProfile()" src=""/>
</div>
<div class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-xl gradient-text">
100Dollars
</div>
<button onclick="logout()" class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-zinc-500 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined">logout</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 px-margin-mobile flex flex-col gap-stack-lg max-w-md mx-auto">
<!-- Central Earning Card -->
<section class="relative bg-surface-container rounded-xl p-6 border border-outline-variant overflow-hidden shadow-[0_4px_24px_rgba(0,0,0,0.6)]">
<div class="absolute -top-10 -right-10 w-40 h-40 bg-primary-container/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="flex flex-col items-center justify-center text-center gap-stack-sm relative z-10">
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest opacity-80">Available Balance</p>
<h1 class="font-display-lg text-display-lg text-primary-container drop-shadow-[0_0_12px_rgba(34,255,0,0.4)]">$<span id="balance">0.00</span></h1>
<div class="w-full mt-stack-md flex flex-col gap-unit">
<div class="flex justify-between font-label-caps text-[10px] text-on-surface-variant">
<span>$0</span>
<span class="text-primary-fixed">Goal: $100.00</span>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden border border-outline-variant/30">
<div class="h-full bg-primary-container rounded-full shadow-[0_0_10px_rgba(34,255,0,0.6)]" id="balanceProgress" style="width: 0%;"></div>
</div>
</div>
</div>
<button onclick="showWithdraw()" class="mt-stack-lg w-full py-4 rounded-full bg-gradient-to-b from-primary-container to-inverse-primary text-on-primary-container font-headline-md text-body-lg font-bold shadow-[0_0_20px_rgba(34,255,0,0.3)] border-t border-white/20 active:scale-95 transition-all duration-150">
Cash Out Now
</button>
</section>
<!-- Quick Stats -->
<section class="grid grid-cols-2 gap-stack-sm">
<div class="bg-surface rounded-DEFAULT p-4 border border-outline-variant/30">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">schedule</span>
<span class="text-xs text-on-surface-variant">Pending</span>
</div>
<p class="text-xl font-bold text-on-surface">$<span id="pending">0.00</span></p>
</div>
<div class="bg-surface rounded-DEFAULT p-4 border border-outline-variant/30">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
<span class="text-xs text-on-surface-variant">Total Earned</span>
</div>
<p class="text-xl font-bold text-on-surface">$<span id="totalEarned">0.00</span></p>
</div>
</section>
<!-- Daily Tasks Section -->
<section class="flex flex-col gap-stack-md">
<div class="flex justify-between items-center">
<h2 class="font-headline-md text-headline-md text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">task_alt</span> Tasks
</h2>
<button onclick="refreshTasks()" class="text-xs text-primary-container font-bold hover:underline">Refresh</button>
</div>
<div class="grid grid-cols-1 gap-stack-sm" id="tasksGrid">
<!-- Tasks will be loaded here -->
</div>
</section>
<!-- Withdraw Section -->
<section class="flex flex-col gap-stack-md">
<h2 class="font-headline-md text-headline-md text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">payments</span> Cash Out
</h2>
<div class="bg-surface rounded-DEFAULT p-4 border border-outline-variant/30">
<div class="flex gap-3">
<input type="number" id="withdrawAmount" placeholder="$Amount" class="flex-1 px-4 py-3 rounded-full bg-surface-container border border-outline-variant text-on-surface placeholder:text-zinc-600 focus:border-primary-container focus:outline-none"/>
<button onclick="withdraw()" id="withdrawBtn" class="px-6 py-3 rounded-full bg-primary-container text-black font-bold shadow-[0_0_20px_rgba(34,255,0,0.3)] hover:scale-105 transition-transform disabled:opacity-50 disabled:cursor-not-allowed">
Withdraw
</button>
</div>
<p class="text-xs text-on-surface-variant mt-2 text-center">Minimum $5.00 withdrawal</p>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-6 w-full max-w-md mx-auto flex justify-around items-center h-20 px-4 z-50 fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] rounded-full border border-zinc-800/60 shadow-[0_0_20px_rgba(0,0,0,0.8)] shadow-lime-500/5 bg-zinc-950/90 backdrop-blur-2xl">
<button class="flex flex-col items-center justify-center text-lime-400 drop-shadow-[0_0_8px_rgba(34,255,0,0.5)] scale-110 hover:text-zinc-200 transition-all">
<span class="material-symbols-outlined mb-1 text-2xl" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="text-[10px] font-medium">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-600 hover:text-zinc-200 transition-all">
<span class="material-symbols-outlined mb-1 text-2xl">payments</span>
<span class="text-[10px] font-medium">Wallet</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-600 hover:text-zinc-200 transition-all">
<span class="material-symbols-outlined mb-1 text-2xl">leaderboard</span>
<span class="text-[10px] font-medium">Rank</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-600 hover:text-zinc-200 transition-all">
<span class="material-symbols-outlined mb-1 text-2xl">person</span>
<span class="text-[10px] font-medium">Profile</span>
</button>
</nav>
<!-- Toast -->
<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full bg-surface-container border border-outline-variant text-on-surface font-bold z-[1000] hidden"></div>
<script src="scripts/dashboard.js"></script>
</body>
</html>
