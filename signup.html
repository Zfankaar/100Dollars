<body class="text-on-background min-h-screen font-body-md">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-40 backdrop-blur-xl border-b flex justify-between items-center px-4 py-3 shadow-none">
<div class="flex items-center gap-3">
<a href="index.html" class="flex items-center gap-2 cursor-pointer hover:scale-95 duration-100">
<span class="material-symbols-outlined gradient-text" style="font-size: 28px;">arrow_back</span>
</a>
</div>
<div class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-xl gradient-text">
100Dollars
</div>
<div class="w-12 h-12"></div>
</header>
<!-- Main Content Canvas -->
<main class="pt-16 px-4 flex flex-col gap-4 max-w-md mx-auto pb-8">
<!-- Logo Section -->
<section class="flex flex-col items-center justify-center py-5">
<div class="mb-6">
<svg width="100" height="100" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="coinFull" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#22ff00"/>
<stop offset="100%" stop-color="#16aa00"/>
</linearGradient>
</defs>
<circle cx="60" cy="60" r="56" fill="#22ff00" opacity="0.1"/>
<circle cx="60" cy="60" r="52" fill="#22ff00" opacity="0.15"/>
<circle cx="60" cy="60" r="44" fill="#222"/>
<circle cx="60" cy="60" r="42" fill="url(#coinFull)"/>
<path d="M60 28 L60 104" stroke="#222" stroke-width="4" stroke-linecap="round" fill="none"/>
<path d="M42 72 Q42 48 60 48 Q78 48 78 72 Q78 96 60 96 Q42 96 42 72" stroke="#222" stroke-width="3" stroke-linecap="round" fill="none"/>
<line x1="38" y1="48" x2="54" y2="48" stroke="#222" stroke-width="2" stroke-linecap="round"/>
<line x1="66" y1="96" x2="82" y2="96" stroke="#222" stroke-width="2" stroke-linecap="round"/>
</svg>
</div>
<!-- Title -->
<div class="text-center">
<h1 class="font-display-lg text-3xl text-on-surface font-bold text-center gradient-text">Create Account</h1>
<p class="text-on-surface-variant mt-2 glow-text">Start earning today</p>
</div>
<!-- Sign Up Form -->
<form class="flex flex-col gap-4 mt-8" onsubmit="handleSignup(event)">
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant">FULL NAME</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">person</span>
<input type="text" id="name" required class="w-full pl-12 pr-8 py-3 rounded-lg bg-white border-2 border-gray-300 text-gray-800 text-sm placeholder-gray-500 focus:border-green-500 focus:outline-none focus:ring-2 focus:ring-green-200 transition-all" placeholder="Enter your name"/>
</div>
</div>
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant">EMAIL</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">mail</span>
<input type="email" id="email" required class="w-full pl-12 pr-8 py-3 rounded-lg bg-white border-2 border-gray-300 text-gray-800 text-sm placeholder-gray-500 focus:border-green-500 focus:outline-none focus:ring-2 focus:ring-green-200 transition-all" placeholder="Enter your email"/>
</div>
</div>
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant">PASSWORD</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">lock</span>
<input type="password" id="password" required minlength="6" class="w-full pl-12 pr-12 py-3 rounded-lg bg-white border-2 border-gray-300 text-gray-800 text-sm placeholder-gray-500 focus:border-green-500 focus:outline-none focus:ring-2 focus:ring-green-200 transition-all" placeholder="Create password (min 6 chars)"/>
<button type="button" onclick="togglePassword('password')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-green-600">
<span class="material-symbols-outlined" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant">CONFIRM PASSWORD</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">lock</span>
<input type="password" id="confirmPassword" required minlength="6" class="w-full pl-12 pr-12 py-3 rounded-lg bg-white border-2 border-gray-300 text-gray-800 text-sm placeholder-gray-500 focus:border-green-500 focus:outline-none focus:ring-2 focus:ring-green-200 transition-all" placeholder="Confirm password"/>
<button type="button" onclick="togglePassword('confirmPassword')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-green-600">
<span class="material-symbols-outlined" id="confirmPasswordIcon">visibility</span>
</button>
</div>
</div>
<button type="submit" class="mt-stack-md w-full py-5 rounded-full bg-gradient-to-b from-primary-container to-inverse-primary text-on-primary-container font-headline-md font-bold shadow-[0_0_20px_rgba(34,255,0,0.3)] border-t border-white/20 active:scale-95 transition-all duration-150">
Create Account
</button>
</form>
<!-- Login Link -->
<p class="text-center text-on-surface-variant mt-stack-md">
Already have an account? 
<a href="login.html" class="text-primary-container font-bold hover:underline glow-text">Login</a>
</p>
</main>
<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 pl-20 px-24 py-5 rounded-xl bg-gradient-to-r from-primary-container to-primary-fixed shadow-[0_0_20px_rgba(34,255,0,0.5)] text-black font-bold z-[1000] hidden flex items-center gap-2">
<span class="material-symbols-outlined" id="toastIcon">check_circle</span>
<span id="toastText"></span>
</div>
<script>
const USERS_KEY = '100dollars_users';
function togglePassword(fieldId) {
const input = document.getElementById(fieldId);
const icon = document.getElementById(fieldId + 'Icon');
if (input.type === 'password') {
input.type = 'text';
icon.textContent = 'visibility_off';
} else {
input.type = 'password';
icon.textContent = 'visibility';
}
}
function showToast(msg, isError = false) {
const t = document.getElementById('toast');
const ti = document.getElementById('toastIcon');
const tt = document.getElementById('toastText');
tt.textContent = msg;
if (isError) {
t.className = 'fixed top-6 left-1/2 -translate-x-1/2 pl-20 px-24 py-5 rounded-xl bg-red-500 shadow-[0_0_20px_rgba(255,0,0,0.3)] text-white font-bold z-[1000] hidden flex items-center gap-2';
ti.textContent = 'error';
} else {
t.className = 'fixed top-6 left-1/2 -translate-x-1/2 pl-20 px-24 py-5 rounded-xl bg-gradient-to-r from-primary-container to-primary-fixed shadow-[0_0_20px_rgba(34,255,0,0.5)] text-black font-bold z-[1000] hidden flex items-center gap-2';
ti.textContent = 'check_circle';
}
t.classList.remove('hidden');
t.classList.add('flex');
setTimeout(() => { t.classList.add('hidden'); t.classList.remove('flex'); }, 3000);
}
function handleSignup(e) {
e.preventDefault();
const name = document.getElementById('name').value.trim();
const email = document.getElementById('email').value.trim();
const password = document.getElementById('password').value;
const confirmPassword = document.getElementById('confirmPassword').value;
if (password !== confirmPassword) { showToast('Passwords do not match', true); return; }
if (password.length < 6) { showToast('Password must be at least 6 characters', true); return; }
const users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];
if (users.find(u => u.email === email)) { showToast('Email already registered', true); return; }
const newUser = { id: Date.now(), name, email, password, createdAt: new Date().toISOString() };
users.push(newUser);
localStorage.setItem(USERS_KEY, JSON.stringify(users));
localStorage.setItem('100dollars_session', JSON.stringify(newUser));
showToast('Account created!');
setTimeout(() => window.location.href = 'dashboard.html', 1000);
}
</script>
