<style>

<script>
// Apply theme immediately before page loads to prevent flash
if (localStorage.getItem('100dollars_theme') === 'light') {
    document.documentElement.classList.add('light-mode');
}
</script>
<body class="text-on-background min-h-screen font-body-md">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-40 backdrop-blur-xl border-b flex justify-between items-center px-6 py-4 shadow-none">
<div class="flex items-center gap-3">
<a href="index.html" class="flex items-center gap-2 cursor-pointer hover:scale-95 duration-100">
<span class="material-symbols-outlined gradient-text" style="font-size: 28px;">arrow_back</span>
</a>
</div>
<div class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-xl gradient-text">
100Dollars
</div>
<div class="w-12 h-12"></div>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 px-margin-mobile flex flex-col gap-stack-lg max-w-md mx-auto pb-8">
<!-- Title -->
<div class="text-center mt-8">
<h1 class="font-display-lg text-3xl text-on-surface font-bold text-center gradient-text">Welcome Back</h1>
<p class="text-on-surface-variant mt-2 glow-text">Login to continue earning</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-stack-md" onsubmit="handleLogin(event)">
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant">EMAIL</label>
<input type="email" id="email" required class="w-full px-4 py-4 rounded-DEFAULT bg-surface-container border border-outline-variant text-on-surface placeholder:text-zinc-600 focus:border-primary-container focus:outline-none" placeholder="Enter your email"/>
</div>
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant">PASSWORD</label>
<input type="password" id="password" required class="w-full px-4 py-4 rounded-DEFAULT bg-surface-container border border-outline-variant text-on-surface placeholder:text-zinc-600 focus:border-primary-container focus:outline-none" placeholder="Enter your password"/>
</div>
<button type="submit" class="mt-stack-md w-full py-4 rounded-full bg-gradient-to-b from-primary-container to-inverse-primary text-on-primary-container font-headline-md font-bold shadow-[0_0_20px_rgba(34,255,0,0.3)] border-t border-white/20 active:scale-95 transition-all duration-150">
Login
</button>
</form>
<!-- Sign Up Link -->
<p class="text-center text-on-surface-variant mt-stack-md">
Don't have an account? 
<a href="signup.html" class="text-primary-container font-bold hover:underline glow-text">Sign Up</a>
</p>
</main>
<!-- Toast -->
<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full bg-surface-container border border-outline-variant text-on-surface font-bold z-[1000] hidden"></div>
<script>
const USERS_KEY = '100dollars_users';
const SESSION_KEY = '100dollars_session';
function handleLogin(e) {
e.preventDefault();
const email = document.getElementById('email').value.trim();
const password = document.getElementById('password').value;
const users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];
const user = users.find(u => u.email === email && u.password === password);
if (!user) { showToast('Invalid email or password'); return; }
localStorage.setItem(SESSION_KEY, JSON.stringify(user));
showToast('Login successful!');
setTimeout(() => window.location.href = 'dashboard.html', 1000);
}
function showToast(msg) {
const t = document.getElementById('toast');
t.textContent = msg;
t.classList.remove('hidden');
t.classList.add('block');
setTimeout(() => { t.classList.add('hidden'); t.classList.remove('block'); }, 3000);
}
function toggleMode() {
    const isLight = document.body.classList.toggle('light-mode');
    document.documentElement.classList.toggle('light-mode', isLight);
    const icon = document.getElementById('modeIcon');
    if (isLight) {
        icon.textContent = 'dark_mode';
        localStorage.setItem('100dollars_theme', 'light');
    } else {
        icon.textContent = 'light_mode';
        localStorage.setItem('100dollars_theme', 'dark');
    }
}
</script>
